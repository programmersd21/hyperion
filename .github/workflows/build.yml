name: Hyperion Kernel Build CI

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

defaults:
  run:
    shell: bash -e -o pipefail {0}

jobs:
  validate-config:
    name: Validate Hyperion Config
    runs-on: ubuntu-latest
    outputs:
      VERSION:      ${{ steps.parse-config.outputs.VERSION }}
      PATCH:        ${{ steps.parse-config.outputs.PATCH }}
      SUB:          ${{ steps.parse-config.outputs.SUB }}
      EXTRA:        ${{ steps.parse-config.outputs.EXTRA }}
      LOCAL:        ${{ steps.parse-config.outputs.LOCAL }}
      TAG:          ${{ steps.parse-config.outputs.TAG }}
      HYPERION_VER: ${{ steps.parse-config.outputs.HYPERION_VER }}
      FULL_VERSION: ${{ steps.parse-config.outputs.FULL_VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse hyperion.config
        id: parse-config
        run: |
          python3 <<'EOF'
          import sys
          import os

          config = {}
          with open('hyperion.config') as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  if '=' not in line:
                      print(f"Invalid line: {line}")
                      sys.exit(1)
                  k, v = line.split('=', 1)
                  config[k.strip()] = v.strip().strip('"')

          def parse_int(k, default=0):
              v = config.get(k, '')
              if not v:
                  return default
              try:
                  return int(v)
              except ValueError:
                  print(f"Invalid {k}: {v}")
                  sys.exit(1)

          VERSION      = parse_int('CONFIG_VERSION')
          PATCH        = parse_int('CONFIG_PATCHLEVEL')
          SUB          = parse_int('CONFIG_SUBLEVEL')
          EXTRA        = config.get('CONFIG_EXTRAVERSION', '')
          LOCAL        = config.get('CONFIG_LOCALVERSION', '')
          FULL_VERSION = f"{VERSION}.{PATCH}" if SUB == 0 else f"{VERSION}.{PATCH}.{SUB}"
          HYPERION_VER = LOCAL.split('-Hyperion-', 1)[-1] if '-Hyperion-' in LOCAL else LOCAL.lstrip('-')
          TAG          = HYPERION_VER

          outputs = {
              "VERSION":      VERSION,
              "PATCH":        PATCH,
              "SUB":          SUB,
              "EXTRA":        EXTRA,
              "LOCAL":        LOCAL,
              "TAG":          TAG,
              "HYPERION_VER": HYPERION_VER,
              "FULL_VERSION": FULL_VERSION,
          }

          github_output = os.environ.get('GITHUB_OUTPUT', '/dev/stdout')
          with open(github_output, 'a') as f:
              for k, v in outputs.items():
                  f.write(f"{k}={v}\n")
          EOF

  build-kernel:
    name: Build Linux Hyperion Kernel
    needs: validate-config
    runs-on: ubuntu-latest
    env:
      KERNEL_VERSION:    ${{ needs.validate-config.outputs.VERSION }}
      PATCHLEVEL:        ${{ needs.validate-config.outputs.PATCH }}
      SUBLEVEL:          ${{ needs.validate-config.outputs.SUB }}
      EXTRAVERSION:      ${{ needs.validate-config.outputs.EXTRA }}
      LOCALVERSION:      ${{ needs.validate-config.outputs.LOCAL }}
      TAG_NAME:          ${{ needs.validate-config.outputs.TAG }}
      HYPERION_VER:      ${{ needs.validate-config.outputs.HYPERION_VER }}
      FULL_VERSION:      ${{ needs.validate-config.outputs.FULL_VERSION }}
      KBUILD_BUILD_USER: Soumalya Das
      KBUILD_BUILD_HOST: hyperion-ci

    steps:
      - uses: actions/checkout@v4

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ env.FULL_VERSION }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ env.FULL_VERSION }}-
            ccache-

      - name: Restore kernel build
        uses: actions/cache@v4
        with:
          path: build
          key: kernel-build-${{ env.FULL_VERSION }}-${{ hashFiles('hyperion.config') }}
          restore-keys: |
            kernel-build-${{ env.FULL_VERSION }}-
            kernel-build-

      - name: Restore kernel source
        uses: actions/cache@v4
        with:
          path: build-src
          key: kernel-src-${{ env.FULL_VERSION }}
          restore-keys: |
            kernel-src-${{ env.KERNEL_VERSION }}.${{ env.PATCHLEVEL }}.
            kernel-src-

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses-dev bison flex libssl-dev libelf-dev \
            dwarves bc pahole git make gcc zstd cpio perl rsync ccache wget tar

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=5G
          ccache --set-config=compression=true
          ccache --set-config=compression_level=1
          ccache --set-config=sloppiness=locale,time_macros,include_file_mtime
          ccache --zero-stats

      - name: Download & extract kernel
        run: |
          mkdir -p build-src
          if [ ! -d "build-src/linux-${FULL_VERSION}" ]; then
            if [ ! -f "build-src/linux-${FULL_VERSION}.tar.xz" ]; then
              wget -q \
                "https://cdn.kernel.org/pub/linux/kernel/v${KERNEL_VERSION}.x/linux-${FULL_VERSION}.tar.xz" \
                -O "build-src/linux-${FULL_VERSION}.tar.xz"
            fi
            tar -xf "build-src/linux-${FULL_VERSION}.tar.xz" -C build-src
            # Only move if extracted directory name differs from expected
            EXTRACTED_DIR=$(find build-src -maxdepth 1 -mindepth 1 -type d -not -name "linux-${FULL_VERSION}" | head -1)
            if [ -n "$EXTRACTED_DIR" ]; then
              mv "$EXTRACTED_DIR" "build-src/linux-${FULL_VERSION}"
            fi
          fi

      - name: Apply patches if any
        run: |
          shopt -s nullglob
          PATCHES=(patches/*.patch)
          if [ ${#PATCHES[@]} -gt 0 ]; then
            cd "build-src/linux-${FULL_VERSION}"
            for p in ../../patches/*.patch; do
              # Check if patch is already applied (for cached source trees)
              if patch -p1 --dry-run -R < "$p" &>/dev/null; then
                echo "Patch $(basename $p) already applied, skipping"
              else
                echo "Applying patch $(basename $p)"
                patch -p1 < "$p"
              fi
            done
          fi

      - name: Configure kernel
        run: |
          # Clean source tree if it exists (handles cached sources)
          if [ -d "build-src/linux-${FULL_VERSION}" ]; then
            make -C "build-src/linux-${FULL_VERSION}" mrproper
          fi
          cp hyperion.config "build-src/linux-${FULL_VERSION}/.config"
          make -C "build-src/linux-${FULL_VERSION}" O="$(pwd)/build" olddefconfig \
            LOCALVERSION="${LOCALVERSION}" \
            KBUILD_BUILD_USER="${KBUILD_BUILD_USER}" \
            KBUILD_BUILD_HOST="${KBUILD_BUILD_HOST}"

      - name: Build kernel
        run: |
          BUILD_START=$(date +%s)
          make -j$(nproc) -C "build-src/linux-${FULL_VERSION}" O="$(pwd)/build" \
            CC="ccache gcc" \
            KCFLAGS="-pipe" \
            LOCALVERSION="${LOCALVERSION}" \
            KBUILD_BUILD_USER="${KBUILD_BUILD_USER}" \
            KBUILD_BUILD_HOST="${KBUILD_BUILD_HOST}" \
            2>&1 | tee build/build.log
          BUILD_END=$(date +%s)
          echo $((BUILD_END - BUILD_START)) > .build_seconds

      - name: Print ccache stats
        run: ccache --show-stats

      - name: Install modules to staging
        run: |
          mkdir -p staging
          make -C "build-src/linux-${FULL_VERSION}" O="$(pwd)/build" modules_install \
            INSTALL_MOD_PATH="$(pwd)/staging" \
            INSTALL_MOD_STRIP=1 \
            LOCALVERSION="${LOCALVERSION}"
          make -C "build-src/linux-${FULL_VERSION}" O="$(pwd)/build" headers_install \
            INSTALL_HDR_PATH="$(pwd)/staging/usr" \
            LOCALVERSION="${LOCALVERSION}"

      - name: Package artifacts
        run: |
          cp hyperion.config build/hyperion.config
          strip --strip-debug build/vmlinux -o build/vmlinux.stripped
          tar --zstd -cf "Hyperion-Kernel-${FULL_VERSION}.tar.zst" \
            -C build \
            arch/x86/boot/bzImage \
            vmlinux.stripped \
            System.map \
            build.log \
            hyperion.config
          tar --zstd -cf "Hyperion-Modules-${FULL_VERSION}.tar.zst" -C staging/lib/modules .
          tar --zstd -cf "Hyperion-Headers-${FULL_VERSION}.tar.zst" -C staging/usr/include .

      - name: Generate checksums
        run: |
          sha256sum \
            "Hyperion-Kernel-${FULL_VERSION}.tar.zst" \
            "Hyperion-Modules-${FULL_VERSION}.tar.zst" \
            "Hyperion-Headers-${FULL_VERSION}.tar.zst" \
            > "Hyperion-${FULL_VERSION}.sha256"

      - name: Write build summary
        run: |
          BUILD_SEC=$(cat .build_seconds || echo 0)
          BUILD_MIN=$((BUILD_SEC / 60))
          BUILD_SEC=$((BUILD_SEC % 60))
          CCACHE_HIT_RATE=$(ccache --show-stats | awk '/Hits:/ {gsub(/[()%]/,"",$NF); print $NF}')
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## Hyperion ${HYPERION_VER} - Build Summary
          
          | Field            | Value                                                          |
          |------------------|----------------------------------------------------------------|
          | Kernel           | Linux ${FULL_VERSION}                                          |
          | Hyperion ver     | ${HYPERION_VER}                                                |
          | Release tag      | ${TAG_NAME}                                                    |
          | Build time       | ${BUILD_MIN}m ${BUILD_SEC}s                                    |
          | CPUs used        | $(nproc)                                                       |
          | bzImage size     | $(du -sh build/arch/x86/boot/bzImage | cut -f1)                |
          | Kernel tar size  | $(du -sh "Hyperion-Kernel-${FULL_VERSION}.tar.zst" | cut -f1)  |
          | Modules tar size | $(du -sh "Hyperion-Modules-${FULL_VERSION}.tar.zst" | cut -f1) |
          | ccache hit rate  | ${CCACHE_HIT_RATE}%                                            |
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Hyperion ${{ env.HYPERION_VER }} based on Linux ${{ env.FULL_VERSION }}
          generate_release_notes: true
          files: |
            Hyperion-Kernel-${{ env.FULL_VERSION }}.tar.zst
            Hyperion-Modules-${{ env.FULL_VERSION }}.tar.zst
            Hyperion-Headers-${{ env.FULL_VERSION }}.tar.zst
            Hyperion-${{ env.FULL_VERSION }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          