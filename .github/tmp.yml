name: Replace Version Text-Safe

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  replace-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Setup Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Replace all versions 0.0.0 → 2.2.0 with 2.2.1
        run: |
          echo "Normalizing versions to 2.2.1..."
          find . -type f ! -path "*/.git/*" ! -path "*/.github/*" -print0 | while IFS= read -r -d '' file; do
            if file --mime "$file" | grep -q 'charset='; then
              perl -pi -e 's/(^|[^0-9])(?:[0-1]?\d|2)\.(?:\d{1,2})\.(?:\d{1,2})([^0-9]|$)/${1}2.2.1${2}/g' "$file"
            fi
          done

      - name: Commit & push changes
        run: |
          git add .
          git diff --cached --quiet || git commit -m "Version normalization → 2.2.1 [skip ci]"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${GITHUB_REF#refs/heads/}
